repos:
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
    - id: fmt
    - id: clippy
  - repo: https://github.com/DevinR528/cargo-sort
    rev: v2.1.3
    hooks:
    - id: cargo-sort
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
    - id: reuse
